<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Centered Vegas Dashboard</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  body {
    margin: 0;
    padding: 0;
    background-color: transparent !important;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    color: #000;
    overflow: hidden;
    /* Centers the entire container horizontally in the SharePoint box */
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center; /* Centers all child elements */
    text-align: center;
    max-width: 500px;
    padding-top: 5px;
  }

  .location-tag {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #666;
    margin-bottom: 2px;
  }

  .main-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 35px; /* Balanced space between Time and Weather */
  }

  /* Time Section */
  .time-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .time-row {
    display: flex;
    align-items: baseline;
    line-height: 1;
  }

  #clock {
    font-size: 3.5em;
    font-weight: 800;
    letter-spacing: -2px;
    margin: 0;
  }

  #ampm {
    font-size: 1.2em;
    font-weight: 700;
    margin-left: 5px;
    color: #333;
  }

  #date {
    font-size: 1.1em;
    font-weight: 600;
    color: #555;
    margin-top: 5px;
  }

  /* Weather Section */
  .weather-section {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #weather-icon {
    width: 50px;
    height: 50px;
  }

  .temp-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #temp {
    font-size: 2.8em;
    font-weight: 800;
    line-height: 1;
    margin: 0;
  }

  #condition {
    font-size: 0.9em;
    font-weight: 700;
    color: #0073CE; /* Blue accent matching your Boyd card */
    text-transform: uppercase;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="location-tag">Las Vegas, Nevada</div>
  
  <div class="main-content">
    <div class="time-section">
      <div class="time-row">
        <span id="clock">--:--</span>
        <span id="ampm">--</span>
      </div>
      <div id="date">----, ----- --</div>
    </div>

    <div class="weather-section">
      <div id="weather-icon"></div>
      <div class="temp-group">
        <div id="temp">--°</div>
        <div id="condition">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const icons = {
    sun: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFB800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></svg>`,
    moon: `<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`,
    cloud: `<svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>`,
    rain: `<svg viewBox="0 0 24 24" fill="none" stroke="#0073CE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 13a4 4 0 0 1-8 0"/><path d="M8 10a5 5 0 0 1 10 0v3a3 3 0 0 1-6 0v-3"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="19" x2="8" y2="21"/><line x1="16" y1="19" x2="16" y2="21"></svg>`
  };

  function updateTime() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
    document.getElementById('ampm').textContent = ampm;
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }

  async function fetchWeather() {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=36.17&longitude=-115.14&current=temperature_2m,is_day,weather_code&temperature_unit=fahrenheit&timezone=auto`;
      const res = await fetch(url);
      const data = await res.json();
      const isDay = data.current.is_day === 1;
      const code = data.current.weather_code;
      document.getElementById('temp').textContent = `${Math.round(data.current.temperature_2m)}°`;
      
      let iconHtml = code === 0 ? (isDay ? icons.sun : icons.moon) : (code <= 3 ? icons.cloud : icons.rain);
      let conditionText = code === 0 ? "Clear" : (code <= 3 ? "Partly Cloudy" : "Rainy");

      document.getElementById('weather-icon').innerHTML = iconHtml;
      document.getElementById('condition').textContent = conditionText;
    } catch (err) { console.error(err); }
  }

  updateTime();
  fetchWeather();
  setInterval(updateTime, 1000);
  setInterval(fetchWeather, 900000);
</script>

</body>
</html>
