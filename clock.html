<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Compact Vegas Clock</title>
<style>
  /* Force SharePoint to drop all internal spacing */
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  body {
    margin: 0;
    padding: 0; /* Removed the 5px padding */
    background-color: transparent !important;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    color: #000;
    overflow: hidden; /* Prevents scrollbars from adding bulk */
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
  }

  .location-tag {
    font-size: 11px; /* Smaller to match native Las Vegas tag */
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: -2px; /* Pulls the clock up */
  }

  .time-row {
    display: flex;
    align-items: baseline;
    margin-left: -2px; /* Pulls text to the very edge */
  }

  #clock {
    font-size: 3.2em; /* Adjusted for better fit */
    font-weight: 800;
    letter-spacing: -2px;
    margin: 0;
    line-height: 1.1; /* Tightens the vertical space */
  }

  #ampm {
    font-size: 1.1em;
    font-weight: 700;
    margin-left: 4px;
    color: #333;
  }

  .date-row {
    font-size: 1.1em; /* Closer to the native text size */
    font-weight: 600;
    color: #444;
    margin-top: -2px; /* Pulls the date up to the time */
    letter-spacing: -0.3px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="location-tag">Las Vegas, Nevada</div>
  
  <div class="time-row">
    <span id="clock">--:--</span>
    <span id="ampm">--</span>
  </div>
  
  <div class="date-row" id="date">
    ----, ----- --
  </div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
    document.getElementById('ampm').textContent = ampm;

    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }
  updateTime();
  setInterval(updateTime, 1000);
</script>

</body>
</html>
