<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sleek Command Clock</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    margin: 0;
    padding: 10px;
    background-color: transparent;
    font-family: 'Segoe UI', sans-serif;
    color: white;
  }

  .card {
    border-radius: 12px;
    padding: 24px;
    max-width: 400px;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 140px; 
  }

  .time-display {
    display: flex;
    align-items: baseline;
    margin: 0;
  }

  #clock {
    font-size: 3.5em;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }

  #ampm {
    font-size: 1.2em;
    font-weight: 600;
    margin-left: 8px;
    opacity: 0.8;
  }

  .date-row {
    font-size: 1.3em;
    font-weight: 600;
    color: #9fdfff;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="time-display">
    <span id="clock">--:--</span>
    <span id="ampm">--</span>
  </div>
  <div class="date-row" id="date">Loading...</div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    
    // Time Logic
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
    document.getElementById('ampm').textContent = ampm;

    // Date Logic
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }

  // Refresh every second
  setInterval(updateTime, 1000);
  updateTime();
</script>

</body>
</html>
