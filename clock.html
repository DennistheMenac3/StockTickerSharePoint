<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sleek Command Clock - Minimal</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    margin: 0;
    padding: 10px;
    background-color: transparent;
    font-family: 'Segoe UI', sans-serif;
    color: white;
  }

  .card {
    border-radius: 12px;
    padding: 24px;
    max-width: 400px;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: center; /* Centers the text vertically since bar is gone */
    min-height: 140px; 
  }

  #clock {
    font-size: 3.5em;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin: 0;
  }

  #ampm {
    font-size: 0.4em; /* Smaller relative to the big numbers */
    font-weight: 600;
    margin-left: 5px;
    opacity: 0.8;
    vertical-align: middle;
  }

  .date-row {
    font-size: 1.3em;
    font-weight: 600;
    color: #9fdfff;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="card">
  <div>
    <span id="clock">12:00</span><span id="ampm">PM</span>
  </div>
  <div class="date-row" id="date">Friday, April 10</div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    
    // Time
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
    document.getElementById('ampm').textContent = ampm;

    // Date
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }

  setInterval(updateTime, 1000);
  updateTime();
</script>

</body>
</html>
