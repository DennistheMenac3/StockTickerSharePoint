<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sleek Command Clock - Compact</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    margin: 0;
    padding: 0; /* Removed body padding to save space */
    background-color: transparent;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden; /* Prevents scrollbars */
  }

  .card {
    border-radius: 10px;
    padding: 15px 20px; /* Tighter padding */
    width: auto;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .time-display {
    display: flex;
    align-items: baseline;
  }

  #clock {
    font-size: 2.8em; /* Scaled down from 3.5 */
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  #ampm {
    font-size: 1em;
    font-weight: 600;
    margin-left: 6px;
    opacity: 0.8;
  }

  .date-row {
    font-size: 1.1em;
    font-weight: 600;
    color: #9fdfff;
    margin-top: 8px;
  }

  .location-row {
    font-size: 0.75em;
    font-weight: 700;
    color: #9fdfff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 6px;
    display: flex;
    align-items: center;
    opacity: 0.8;
  }

  .location-row::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background-color: #4ade80;
    border-radius: 50%;
    margin-right: 6px;
    box-shadow: 0 0 5px #4ade80;
  }
</style>
</head>
<body>

<div class="card">
  <div class="time-display">
    <span id="clock">--:--</span>
    <span id="ampm">--</span>
  </div>
  <div class="date-row" id="date">Loading...</div>
  <div class="location-row">Las Vegas, Nevada</div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
    document.getElementById('ampm').textContent = ampm;
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }
  setInterval(updateTime, 1000);
  updateTime();
</script>

</body>
</html>
