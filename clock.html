<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minimal Vegas Clock</title>
<style>
  /* SharePoint Native Integration */
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    margin: 0;
    padding: 0;
    background-color: transparent !important;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    color: #000;
  }

  .container {
    max-width: 400px;
    display: flex;
    flex-direction: column;
    padding: 5px;
  }

  .location-tag {
    font-size: 0.75em;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #666;
    margin-bottom: 2px;
  }

  .time-row {
    display: flex;
    align-items: baseline;
    line-height: 0.9;
  }

  #clock {
    font-size: 4em; /* Slightly larger to fill the space where the bar was */
    font-weight: 800;
    letter-spacing: -2px;
    margin: 0;
    color: #000;
  }

  #ampm {
    font-size: 1.4em;
    font-weight: 700;
    margin-left: 8px;
    color: #222;
  }

  .date-row {
    font-size: 1.4em;
    font-weight: 600;
    color: #444;
    margin-top: 10px;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="location-tag">Las Vegas, Nevada</div>
  
  <div class="time-row">
    <span id="clock">--:--</span>
    <span id="ampm">--</span>
  </div>
  
  <div class="date-row" id="date">
    ----, ----- --
  </div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    
    // Time logic
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
    document.getElementById('ampm').textContent = ampm;

    // Date logic
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }

  // Run immediately and then every second for the clock
  updateTime();
  setInterval(updateTime, 1000);
</script>

</body>
</html>
