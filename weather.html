<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HQ Command Weather</title>
<style>
  /* SharePoint Native Integration */
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  body {
    margin: 0;
    padding: 0;
    background-color: transparent !important;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    color: #000;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
  }

  .location-tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: -2px;
  }

  .weather-row {
    display: flex;
    align-items: center;
    margin-left: -5px;
  }

  /* Weather Icon Styling */
  .weather-icon {
    font-size: 3.5em;
    margin-right: 10px;
    line-height: 1;
    /* This makes it look "cool" and high-end */
    filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
  }

  #temp {
    font-size: 3.2em;
    font-weight: 800;
    letter-spacing: -2px;
    margin: 0;
    line-height: 1.1;
  }

  .condition-area {
    margin-left: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #condition {
    font-size: 1.1em;
    font-weight: 700;
    color: #222;
    line-height: 1;
    text-transform: capitalize;
  }

  .details {
    font-size: 0.85em;
    font-weight: 600;
    color: #666;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="location-tag">HQ Neighborhood Weather</div>
  
  <div class="weather-row">
    <div id="icon" class="weather-icon">☀️</div>
    <div id="temp">--°</div>
    <div class="condition-area">
      <div id="condition">Loading...</div>
      <div class="details" id="feels-like">Feels like --°</div>
    </div>
  </div>
</div>

<script>
  async function fetchWeather() {
    try {
      // Precise Coordinates for Boyd HQ (Rainbow & Post Rd area)
      const lat = 36.071;
      const lon = -115.243;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,is_day&timezone=auto`;
      
      const res = await fetch(url);
      const data = await res.json();
      
      const currentTemp = Math.round(data.current.temperature_2m);
      const feelsLike = Math.round(data.current.apparent_temperature);
      const isDay = data.current.is_day;
      const code = data.current.weather_code;

      // Icon mapping (Cooler, high-end emoji versions)
      const weatherMap = {
        0: { label: "Clear", icon: isDay ? "☀️" : "🌙" },
        1: { label: "Mainly Clear", icon: isDay ? "🌤️" : "🌙" },
        2: { label: "Partly Cloudy", icon: isDay ? "⛅" : "☁️" },
        3: { label: "Overcast", icon: "☁️" },
        45: { label: "Foggy", icon: "🌫️" },
        51: { label: "Drizzle", icon: "🌦️" },
        61: { label: "Rainy", icon: "🌧️" },
        71: { label: "Snowy", icon: "❄️" },
        95: { label: "Thunderstorm", icon: "⛈️" }
      };

      const result = weatherMap[code] || { label: "Clear", icon: "☀️" };

      document.getElementById('temp').textContent = `${currentTemp}°`;
      document.getElementById('icon').textContent = result.icon;
      document.getElementById('condition').textContent = result.label;
      document.getElementById('feels-like').textContent = `Feels like ${feelsLike}°`;

    } catch (err) {
      console.error("Weather Error:", err);
    }
  }

  fetchWeather();
  setInterval(fetchWeather, 900000); // 15 min refresh
</script>

</body>
</html>
