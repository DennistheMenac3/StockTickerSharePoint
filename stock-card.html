<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BYD Stock Card</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .card {
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 450px;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    color: white;
  }

  .stock-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 15px;
  }

  .symbol-label {
    font-size: 1.4em;
    font-weight: 800;
    letter-spacing: 1px;
    opacity: 0.9;
  }

  .price {
    font-size: 2.2em;
    font-weight: 700;
    margin-top: 5px;
  }

  .change-up { color: #4ade80; }
  .change-down { color: #ff8787; }

  .arrow {
    font-size: 2.5em;
    line-height: 1;
  }

  .value-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    margin-top: 20px;
    gap: 10px;
  }

  .label {
    font-size: 0.75em;
    color: #9fdfff;
    text-transform: uppercase;
    font-weight: 700;
  }

  .val-display {
    font-size: 1.1em;
    font-weight: 600;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="card" id="stockCard">
  <div class="stock-info">
    <div>
      <div class="symbol-label">BOYD GAMING (BYD)</div>
      <div class="price" id="price">USD --.--</div>
      <div id="change" class="change-up" style="font-weight: 600;">+0.00 (0.00%)</div>
    </div>
    <div class="arrow" id="arrow">−</div>
  </div>

  <div class="value-grid">
    <div>
      <div class="label">Live Price</div>
      <div class="val-display" id="priceValue">USD --.--</div>
    </div>
    <div>
      <div class="label">Day Change</div>
      <div class="val-display" id="changeValue">--.--</div>
    </div>
  </div>
</div>

<script>
  // Pointing to your secure proxy
  const PROXY_URL = 'https://stock-proxy.dennis-grant91.workers.dev';
  
  // Back to the NYSE ticker for Boyd Gaming
  const symbol = 'BYD'; 

  async function fetchQuote() {
    const priceEl = document.getElementById('price');
    const priceValEl = document.getElementById('priceValue');
    const changeEl = document.getElementById('change');
    const changeValEl = document.getElementById('changeValue');
    const arrowEl = document.getElementById('arrow');

    try {
      const res = await fetch(`${PROXY_URL}?symbol=${symbol}`);
      const data = await res.json();

      if (!data.c || data.c === 0) {
        priceEl.textContent = "Data Error";
        return;
      }

      const current = data.c;
      const previous = data.pc;
      const change = (current - previous).toFixed(2);
      const percent = ((change / previous) * 100).toFixed(2);
      const isUp = change >= 0;

      const color = isUp ? '#4ade80' : '#ff8787';
      const arrow = isUp ? '▲' : '▼';
      const prefix = isUp ? '+' : '';

      priceEl.textContent = `USD ${current.toFixed(2)}`;
      priceValEl.textContent = `USD ${current.toFixed(2)}`;
      
      changeEl.textContent = `${prefix}${change} (${percent}%)`;
      changeEl.className = isUp ? 'change-up' : 'change-down';
      
      changeValEl.textContent = `${prefix}${change}`;
      changeValEl.style.color = color;

      arrowEl.textContent = arrow;
      arrowEl.style.color = color;

    } catch (error) {
      console.error('Fetch Error:', error);
      priceEl.textContent = "Service Offline";
    }
  }

  fetchQuote();
  setInterval(fetchQuote, 300000); // 5 min refresh
</script>

</body>
</html>
