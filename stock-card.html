<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BYD Stock Card</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f0f2f5;
    color: white;
    margin: 0;
    padding: 20px;
  }

  .card {
    border-radius: 12px;
    padding: 24px;
    max-width: 500px;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .stock-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 15px;
  }

  .symbol-label {
    font-size: 1.2em;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  .price {
    font-size: 2.2em;
    font-weight: 700;
    margin-top: 5px;
  }

  .change-up { color: #4ade80; }
  .change-down { color: #ff8787; }

  .arrow {
    font-size: 2.5em;
  }

  .label {
    font-size: 0.75em;
    color: #9fdfff;
    text-transform: uppercase;
    font-weight: bold;
  }

  .value-row {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
  }

  .val {
    font-size: 1.1em;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="card">
  <div class="stock-info">
    <div>
      <div class="symbol-label">BOYD GAMING (BYD)</div>
      <div class="price" id="price">USD --.--</div>
      <div id="change" class="change-up" style="font-weight: 600;">+-- (--%)</div>
    </div>
    <div class="arrow" id="arrow">−</div>
  </div>

  <div class="value-row">
    <div class="label">Last Close</div>
    <div class="label">Change</div>
  </div>

  <div class="value-row">
    <div class="val" id="priceValue">USD --.--</div>
    <div class="val" id="changeValue">--.--</div>
  </div>
</div>

<script>
  // 1. Using your secure Cloudflare Worker URL
  const PROXY_URL = 'https://stock-proxy.dennis-grant91.workers.dev';
  const symbol = 'BYD';

  async function fetchQuote() {
    try {
      // 2. Fetch from the proxy (this adds your key automatically in the background)
      const res = await fetch(`${PROXY_URL}?symbol=${symbol}`);
      const data = await res.json();

      // 3. Finnhub returns 'c' for Current Price. 
      // Even after-hours, it will return the last closing price.
      if (!data.c || data.c === 0) throw new Error("API Limit or Service Error");

      const current = data.c;
      const previous = data.pc;
      const change = (current - previous).toFixed(2);
      const percent = ((change / previous) * 100).toFixed(2);
      const isUp = change >= 0;

      // Update UI elements
      document.getElementById('price').textContent = `USD ${current.toFixed(2)}`;
      document.getElementById('priceValue').textContent = `USD ${current.toFixed(2)}`;
      
      document.getElementById('change').textContent = `${isUp ? '+' : ''}${change} (${percent}%)`;
      document.getElementById('change').className = isUp ? 'change-up' : 'change-down';
      
      const changeValEl = document.getElementById('changeValue');
      changeValEl.textContent = `${isUp ? '+' : ''}${change}`;
      changeValEl.style.color = isUp ? '#4ade80' : '#ff8787';

      const arrowEl = document.getElementById('arrow');
      arrowEl.textContent = isUp ? '▲' : '▼';
      arrowEl.style.color = isUp ? '#4ade80' : '#ff8787';

    } catch (error) {
      console.error('Error fetching quote:', error);
      // Fallback text if the fetch fails
      document.getElementById('price').textContent = "Updating...";
    }
  }

  // Initial load
  fetchQuote();

  // Refresh every 10 minutes to respect API limits (600,000ms)
  setInterval(fetchQuote, 600000);
</script>

</body>
</html>
