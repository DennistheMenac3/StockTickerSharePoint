<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BYD Stock Card</title>
<style>
  /* SharePoint Clean-up */
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    margin: 0;
    padding: 15px;
    background-color: transparent;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  .card {
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    color: white;
    overflow: hidden;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 10px;
    margin-bottom: 15px;
  }

  .symbol { font-size: 1.2em; font-weight: 800; }
  
  .main-price { font-size: 2.4em; font-weight: 700; margin: 5px 0; }

  .change-text { font-size: 1.1em; font-weight: 600; display: flex; align-items: center; gap: 6px; }

  .up { color: #4ade80; }
  .down { color: #ff8787; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

  .label { font-size: 0.75em; color: #9fdfff; text-transform: uppercase; font-weight: bold; }

  .val { font-size: 1.1em; font-weight: 600; }
</style>
</head>
<body>

<div class="card" id="stockCard">
  <div class="header">
    <div class="symbol">BOYD GAMING (BYD)</div>
    <div id="arrow" style="font-size: 2em;">−</div>
  </div>

  <div class="main-price" id="price">USD --.--</div>
  <div id="changeArea" class="change-text">
    <span id="changeVal">--.-- (--%)</span>
  </div>

  <div class="grid">
    <div>
      <div class="label">Live Price</div>
      <div class="val" id="priceValue">USD --.--</div>
    </div>
    <div>
      <div class="label">Day Change</div>
      <div class="val" id="changeValue">--.--</div>
    </div>
  </div>
</div>

<script>
  // YOUR SECURE CLOUDFLARE PROXY
  const PROXY_URL = 'https://stock-proxy.dennis-grant91.workers.dev';
  const symbol = 'BYD';

  async function fetchQuote() {
    try {
      const res = await fetch(`${PROXY_URL}?symbol=${symbol}`);
      if (!res.ok) throw new Error("API Offline");
      
      const data = await res.json();

      // Ensure we have current price 'c'
      if (!data.c || data.c === 0) throw new Error("No Data");

      const current = data.c;
      const previous = data.pc;
      const change = (current - previous).toFixed(2);
      const percent = ((change / previous) * 100).toFixed(2);
      const isUp = change >= 0;

      // Update Header & Main Price
      document.getElementById('price').textContent = `USD ${current.toFixed(2)}`;
      document.getElementById('priceValue').textContent = `USD ${current.toFixed(2)}`;
      
      // Update Change & Colors
      const colorClass = isUp ? 'up' : 'down';
      const arrowIcon = isUp ? '▲' : '▼';
      const sign = isUp ? '+' : '';

      const changeArea = document.getElementById('changeArea');
      changeArea.className = `change-text ${colorClass}`;
      document.getElementById('changeVal').textContent = `${sign}${change} (${percent}%)`;
      
      const changeValBottom = document.getElementById('changeValue');
      changeValBottom.textContent = `${sign}${change}`;
      changeValBottom.className = `val ${colorClass}`;

      const arrow = document.getElementById('arrow');
      arrow.textContent = arrowIcon;
      arrow.className = colorClass;

    } catch (err) {
      console.error("Stock Card Error:", err);
      document.getElementById('price').textContent = "Market Closed";
      document.getElementById('price').style.fontSize = "1.5em";
    }
  }

  fetchQuote();
  // Refresh every 5 minutes
  setInterval(fetchQuote, 300000);
</script>

</body>
</html>
