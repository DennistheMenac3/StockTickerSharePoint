<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BYD Stock Card</title>
<style>
  :host, .canvasZone, .ControlZone {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    border: none !important;
  }

  body {
    margin: 0;
    padding: 15px;
    background-color: transparent;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  .card {
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    background: linear-gradient(135deg, #0073CE 0%, #00569a 100%);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    color: white;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 10px;
    margin-bottom: 15px;
  }

  .symbol { font-size: 1.2em; font-weight: 800; }
  .main-price { font-size: 2.4em; font-weight: 700; margin: 5px 0; }
  .change-text { font-size: 1.1em; font-weight: 600; display: flex; align-items: center; gap: 6px; }

  .up { color: #4ade80; }
  .down { color: #ff8787; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .label { font-size: 0.75em; color: #9fdfff; text-transform: uppercase; font-weight: bold; }
  .val { font-size: 1.1em; font-weight: 600; }
</style>
</head>
<body>

<div class="card" id="stockCard">
  <div class="header">
    <div class="symbol">BOYD GAMING CORPORATION (BYD)</div>
    <div id="arrow" style="font-size: 2em;">−</div>
  </div>

  <div class="main-price" id="price">USD --.--</div>
  <div id="changeArea" class="change-text">
    <span id="changeVal">--.-- (--%)</span>
  </div>

  <div class="grid">
    <div>
      <div class="label">Market Price</div>
      <div class="val" id="priceValue">USD --.--</div>
    </div>
    <div>
      <div class="label">Day Change</div>
      <div class="val" id="changeValue">--.--</div>
    </div>
  </div>
</div>

<script>
  const PROXY_URL = 'https://stock-proxy.dennis-grant91.workers.dev';
  const symbol = 'BYD';

  // Helper function to update the UI
  function updateUI(data) {
    const isUp = data.change >= 0;
    const colorClass = isUp ? 'up' : 'down';
    const arrowIcon = isUp ? '▲' : '▼';
    const sign = isUp ? '+' : '';

    document.getElementById('price').textContent = `USD ${data.current}`;
    document.getElementById('priceValue').textContent = `USD ${data.current}`;
    
    const changeArea = document.getElementById('changeArea');
    changeArea.className = `change-text ${colorClass}`;
    document.getElementById('changeVal').textContent = `${sign}${data.change} (${data.percent}%)`;
    
    const changeValBottom = document.getElementById('changeValue');
    changeValBottom.textContent = `${sign}${data.change}`;
    changeValBottom.className = `val ${colorClass}`;

    const arrow = document.getElementById('arrow');
    arrow.textContent = arrowIcon;
    arrow.className = colorClass;
  }

  async function fetchQuote() {
    try {
      const res = await fetch(`${PROXY_URL}?symbol=${symbol}`);
      if (!res.ok) throw new Error("Network issue");
      
      const rawData = await res.json();
      if (!rawData.c || rawData.c === 0) throw new Error("Invalid data");

      // Format the data
      const current = rawData.c.toFixed(2);
      const previous = rawData.pc;
      const change = (rawData.c - previous).toFixed(2);
      const percent = ((change / previous) * 100).toFixed(2);

      const stockData = { current, change, percent };

      // Save to localStorage so it persists even if you refresh while offline
      localStorage.setItem('last_byd_data', JSON.stringify(stockData));

      // Update the screen
      updateUI(stockData);
      console.log("Stock updated successfully.");

    } catch (err) {
      // IF FAIL: We do nothing to the UI. The old values stay on screen.
      console.warn("Fetch failed, keeping previous data:", err);
    }
  }

  // ON LOAD: Check if we have saved data first so it's never blank
  const savedData = localStorage.getItem('last_byd_data');
  if (savedData) {
    updateUI(JSON.parse(savedData));
  }

  // Start the cycle
  fetchQuote();
  setInterval(fetchQuote, 300000); // 5 minutes
</script>

</body>
</html>
